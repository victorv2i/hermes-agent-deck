name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The default `pnpm e2e` gate (chat + surfaces) is hermetic and drives a
      # headless Chromium against in-process mock servers — install the browser
      # (and its OS deps) before `pnpm verify` runs e2e.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify (format, lint, typecheck, test, build, e2e)
        run: pnpm verify
